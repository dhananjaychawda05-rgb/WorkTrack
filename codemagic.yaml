workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    environment:
      groups:
        - android_signing
      flutter: stable
      java: 17

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true

    scripts:
      - name: Set up keystore
        script: |
          # Decode and save the .jks file
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/my-release-key.jks

          # Create key.properties file for Gradle to read
          cat > "$CM_BUILD_DIR/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_BUILD_DIR/my-release-key.jks
          EOF

      - name: Get Flutter packages
        script: flutter pub get

      - name: Run tests
        script: flutter test

      - name: Build release APK
        script: |
          flutter build apk --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/**/outputs/**/*.apk
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - dhananjaychawda05@gmail.com
        notify:
          success: true
          failure: true